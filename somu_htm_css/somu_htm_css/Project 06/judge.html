<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Justice Landing Page</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#2a2822;
    color:#fff;
}

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 80px;
}

.logo{
    display:flex;
    align-items:center;
    font-size:22px;
    font-weight:600;
}

.logo span{
    margin-left:10px;
}

.nav-links{
    list-style:none;
    display:flex;
    gap:40px;
    align-items:center;
}

.nav-links a{
    text-decoration:none;
    color:#ccc;
    font-size:14px;
    transition:0.3s;
}

.nav-links a:hover{
    color:#fff;
}

.btn{
    border:1px solid #d4af37;
    padding:10px 20px;
    border-radius:8px;
    color:#d4af37;
    font-size:14px;
    text-decoration:none;
    transition:0.3s;
}

.btn:hover{
    background:#d4af37;
    color:#111;
}


.hero{
    padding:60px 80px;
}

.hero-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:50px;
}

.hero-left h1{
    font-size:60px;
    font-weight:800;
    line-height:1.2;
}

.hero-right{
    max-width:450px;
    color:#ccc;
    font-size:16px;
    line-height:1.8;
}

.hero-image img{
    width:100%;
    border-radius:6px;
}
</style>
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <img src="./assets/white-logo.png" alt="">
    </div>

    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Pricing</a></li>
        <li><a href="#">Contact</a></li>
        <li><a href="#">Terms and Conditions</a></li>
        <li><a href="#" class="btn">Get Started</a></li>
    </ul>
</nav>

<!-- Hero Section -->
<section class="hero">
    <div class="hero-top">
        <div class="hero-left">
            <h1>Your Justice Is<br>Our Top Priority</h1>
        </div>

        <div class="hero-right">
            <p>
                As a state of law, maintaining justice is something that every
                citizen must pay attention to, and we are here to uphold justice
                for you.
            </p>
        </div>
    </div>

    <div class="hero-image">
        <img src="./assets/banner.png" alt="Justice Image">
    </div>
</section>

</body>
</html>
