<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project 2 | Registration Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-light">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-9 col-lg-7">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
              <h1 class="h3 text-center mb-4">Student Registration Form</h1>

              <form>
                <div class="mb-3">
                  <label for="name" class="form-label">Full Name</label>
                  <input id="name" type="text" name="name" class="form-control" placeholder="Enter your full name" required />
                </div>

                <div class="mb-3">
                  <label for="email" class="form-label">Email Address</label>
                  <input id="email" type="email" name="email" class="form-control" placeholder="name@example.com" required />
                </div>

                <div class="mb-3">
                  <label for="mobile" class="form-label">Mobile Number</label>
                  <input id="mobile" type="tel" name="mobile" class="form-control" placeholder="10-digit mobile number" pattern="[0-9]{10}" required />
                </div>

                <div class="mb-3">
                  <label for="dob" class="form-label">Date of Birth</label>
                  <input id="dob" type="date" name="dob" class="form-control" required />
                </div>

                <fieldset class="mb-3">
                  <legend class="col-form-label pt-0">Gender</legend>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="gender" id="male" value="Male" required />
                    <label class="form-check-label" for="male">Male</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="gender" id="female" value="Female" />
                    <label class="form-check-label" for="female">Female</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="gender" id="other" value="Other" />
                    <label class="form-check-label" for="other">Other</label>
                  </div>
                </fieldset>

                <div class="mb-4">
                  <label for="document" class="form-label">Upload Document</label>
                  <input id="document" type="file" name="document" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required />
                </div>

                <div class="d-grid">
                  <button type="submit" class="btn btn-primary btn-lg">Submit Registration</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
