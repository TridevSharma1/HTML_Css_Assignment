<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project 3 | Responsive Layout</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }

      .main {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(10px);
      }

      .menu {
        margin: 0;
        padding: 1rem;
        display: flex;
        justify-content: center;
        gap: 1.2rem;
        list-style: none;
        font-weight: 600;
      }

      .hero {
        max-width: 1100px;
        margin: 2rem auto;
        padding: 0 1rem;
      }

      .hero img {
        width: 100%;
        max-height: 380px;
        object-fit: cover;
        border-radius: 18px;
        border: 2px solid #334155;
      }

      .containerr {
        max-width: 1100px;
        margin: 2rem auto 3rem;
        padding: 0 1rem;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 1rem;
      }

      .containerr p {
        margin: 0;
        border: 1px solid #334155;
        border-radius: 12px;
        min-height: 110px;
        display: grid;
        place-items: center;
        font-size: 1.1rem;
        background: linear-gradient(145deg, #1e293b, #0f172a);
      }

      .card-demo {
        max-width: 1100px;
        margin: 0 auto 4rem;
        padding: 0 1rem;
      }

      .stack {
        position: relative;
        height: 280px;
      }

      .stack img {
        position: absolute;
        width: 320px;
        max-width: 85vw;
        border-radius: 14px;
        border: 2px solid #38bdf8;
      }

      .stack img:first-child { left: 20px; top: 30px; z-index: 2; }
      .stack img:last-child { left: 130px; top: 90px; opacity: 0.85; }

      @media (max-width: 640px) {
        .menu { font-size: 0.85rem; gap: 0.6rem; flex-wrap: wrap; }
        .stack { height: 220px; }
        .stack img:first-child { left: 0; top: 20px; }
        .stack img:last-child { left: 80px; top: 70px; }
      }
    </style>
  </head>
  <body>
    <header class="main">
      <ul class="menu">
        <li>Home</li>
        <li>About</li>
        <li>Contact</li>
        <li>Services</li>
      </ul>
    </header>

    <section class="hero">
      <img src="https://images.unsplash.com/photo-1493238792000-8113da705763?auto=format&fit=crop&w=1400&q=80" alt="A sports car on road" />
    </section>

    <section class="containerr">
      <p>First</p>
      <p>Second</p>
      <p>Third</p>
      <p>Fourth</p>
      <p>Fifth</p>
    </section>

    <section class="card-demo">
      <h2>Card Overlay Demo</h2>
      <div class="stack">
        <img src="https://images.unsplash.com/photo-1617531653332-bd46c24f2068?auto=format&fit=crop&w=900&q=80" alt="Blue modern car" />
        <img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d?auto=format&fit=crop&w=900&q=80" alt="Red sports car" />
      </div>
    </section>
  </body>
</html>
